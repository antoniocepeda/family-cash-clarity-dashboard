# Firebase App Hosting configuration for the Next.js app in this directory.
# The App Hosting backend should use "app" as the repo-relative root directory.
runConfig:
  maxInstances: 10
  minInstances: 0
  cpu: 1
  memoryMiB: 512
  concurrency: 80

# Runtime-only Plaid credentials are loaded from Cloud Secret Manager.
# Create these secrets before deploying the App Hosting backend.
env:
  - variable: PLAID_CLIENT_ID
    secret: plaidClientId
    availability:
      - RUNTIME
  - variable: PLAID_SECRET
    secret: plaidSecret
    availability:
      - RUNTIME
  - variable: PLAID_ENV
    secret: plaidEnv
    availability:
      - RUNTIME
